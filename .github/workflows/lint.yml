name: lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # let's ensure consistency with Python version for CI jobs
  PYTHON_VERSION: "3.11"

jobs:
  py-lint:
    name: Ruff formatter (.PY scripts)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.15.12

      - name: Run py_lint.py (formats files in place)
        run: python src/scripts/linting/py_lint.py

      - name: Capture git diff
        id: capture
        shell: bash
        run: |
          git diff > py_lint.diff
          if [ -s py_lint.diff ]; then
            echo "diff_present=true" >> "$GITHUB_OUTPUT"
            echo "Ruff produced formatting changes:"
            echo "----------------------------------------------------------------"
            cat py_lint.diff
            echo "----------------------------------------------------------------"
          else
            echo "diff_present=false" >> "$GITHUB_OUTPUT"
            echo "No formatting changes — repository is ruff-format-clean."
          fi

      - name: Upload diff artifact
        if: steps.capture.outputs.diff_present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: py_lint_diff
          path: py_lint.diff
          if-no-files-found: error

      - name: Fail job if diff is non-empty
        if: steps.capture.outputs.diff_present == 'true'
        shell: bash
        run: |
          echo "::error title=Ruff formatting required::Python files are not ruff-format-clean."
          echo ""
          echo "How to fix:"
          echo "  1. Download the 'py_lint_diff' artifact from this workflow run"
          echo "     to inspect the changes ruff wants to apply."
          echo "  2. Locally run:  python src/scripts/linting/py_lint.py"
          echo "  3. Apply the resulting changes (git add -u), commit, and push."
          echo "  4. Re-run this GitHub Actions workflow."
          echo ""
          echo "See docs/github_actions/linting.md for more details."
          exit 1

  nb-lint:
    name: Ruff formatter (.IPYNB notebooks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff and nbqa
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.15.12 nbqa

      - name: Run nb_lint.py (formats notebooks in place)
        run: python src/scripts/linting/nb_lint.py

      - name: Capture git diff
        id: capture
        shell: bash
        run: |
          git diff > nb_lint.diff
          if [ -s nb_lint.diff ]; then
            echo "diff_present=true" >> "$GITHUB_OUTPUT"
            echo "Ruff produced formatting changes:"
            echo "----------------------------------------------------------------"
            cat nb_lint.diff
            echo "----------------------------------------------------------------"
          else
            echo "diff_present=false" >> "$GITHUB_OUTPUT"
            echo "No formatting changes — notebooks are ruff-format-clean."
          fi

      - name: Upload diff artifact
        if: steps.capture.outputs.diff_present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nb_lint_diff
          path: nb_lint.diff
          if-no-files-found: error

      - name: Fail job if diff is non-empty
        if: steps.capture.outputs.diff_present == 'true'
        shell: bash
        run: |
          echo "::error title=Ruff formatting required::Notebooks are not ruff-format-clean."
          echo ""
          echo "How to fix:"
          echo "  1. Download the 'nb_lint_diff' artifact from this workflow run"
          echo "     to inspect the changes ruff wants to apply."
          echo "  2. Locally run:  python src/scripts/linting/nb_lint.py"
          echo "  3. Apply the resulting changes (git add -u), commit, and push."
          echo "  4. Re-run this GitHub Actions workflow."
          echo ""
          echo "See docs/github_actions/linting.md for more details."
          exit 1
